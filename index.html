<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setlist to Spotify Playlist</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col items-center py-12 px-4">

    <div class="max-w-xl w-full bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold tracking-tight">Setlist ➔ Spotify</h1>
            <button id="settingsBtn" class="text-sm bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-lg transition">⚙️ Setup Keys</button>
        </div>

        <div id="setupAlert" class="mb-6 p-4 bg-amber-950/40 border border-amber-800 text-amber-200 rounded-xl text-sm hidden">
            Please configure your API credentials using the settings button above before starting.
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Artist Name</label>
                <input type="text" id="artistInput" placeholder="e.g., Fontaines D.C." class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-100 focus:outline-none focus:border-green-500 transition">
            </div>
            <button id="generateBtn" class="w-full bg-green-600 hover:bg-green-500 text-zinc-950 font-bold py-3.5 rounded-xl transition cursor-pointer">
                Generate Latest Setlist Playlist
            </button>
        </div>

        <div id="statusLog" class="mt-6 p-4 bg-zinc-950 border border-zinc-800 rounded-xl font-mono text-xs space-y-1 hidden max-h-48 overflow-y-auto">
            </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden">
        <div class="bg-zinc-900 border border-zinc-800 max-w-md w-full p-6 rounded-2xl shadow-2xl space-y-4">
            <h2 class="text-lg font-bold">API Configuration</h2>
            <p class="text-xs text-zinc-400">Keys are saved locally in your browser's storage and never sent to a third-party server.</p>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">Setlist.fm API Key</label>
                    <input type="password" id="setlistKeyInput" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">Spotify Client ID</label>
                    <input type="text" id="spotifyIdInput" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-sm">
                </div>
            </div>

            <div class="flex justify-end space-x-2 pt-2">
                <button id="closeSettings" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg text-sm transition">Cancel</button>
                <button id="saveSettings" class="bg-green-600 hover:bg-green-500 text-zinc-950 font-bold px-4 py-2 rounded-lg text-sm transition">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
